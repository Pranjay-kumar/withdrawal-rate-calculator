  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;

  border-radius: var(--radius-full);

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);

}

.form-range:disabled {

.btn:not(.btn-primary, .viz-tile):is(

    [aria-selected=&quot;true&quot;],

  height: auto;

      const money = new Intl.NumberFormat(&quot;en-US&quot;, { style: &quot;currency&quot;, currency: &quot;USD&quot;, maximumFractionDigits: 0 });
      const pct = new Intl.NumberFormat(&quot;en-US&quot;, { style: &quot;percent&quot;, maximumFractionDigits: 1 });

      function simulate(start, years, initial, annualRate, fee, stockWeight) {
        const annualWithdrawal = initial * annualRate;
        let stockBalance = initial * stockWeight;
        let bondBalance = initial * (1 - stockWeight);
        let balance = initial;
        let peak = initial;
        let maxDrawdown = 0;
        const path = [];
        for (let offset = 0; offset &lt; years; offset += 1) {
          balance = stockBalance + bondBalance;
          const stockShare = balance &gt; 0 ? stockBalance / balance : stockWeight;
          stockBalance -= annualWithdrawal * stockShare;
          bondBalance -= annualWithdrawal * (1 - stockShare);
          balance = stockBalance + bondBalance;
          if (balance &lt;= 0) {
            path.push({ year: offset + 1, balance: 0 });
            return { startDate: String(annualReturns[start][0]), finalBalance: 0, failed: true, failYear: offset + 1, maxDrawdown: -1, path };
          }
          stockBalance *= Math.max(0, 1 + annualReturns[start + offset][1] - fee);
          bondBalance *= Math.max(0, 1 + annualReturns[start + offset][2] - fee);
          balance = stockBalance + bondBalance;
          stockBalance = balance * stockWeight;
          bondBalance = balance * (1 - stockWeight);
          peak = Math.max(peak, balance);
          maxDrawdown = Math.min(maxDrawdown, (balance - peak) / peak);
          path.push({ year: offset + 1, balance });
        }
        return { startDate: String(annualReturns[start][0]), finalBalance: balance, failed: false, failYear: null, maxDrawdown, path };
      }

      function svgEl(name, attrs = {}, text = &quot;&quot;) {

        if (text) el.textContent = text;
        return el;
      }

      function clear(svg, titleText, descText) {
        while (svg.lastChild) svg.removeChild(svg.lastChild);
        const title = svgEl(&quot;title&quot;, {}, titleText);
        title.id = svg.id + &quot;-title&quot;;
        const desc = svgEl(&quot;desc&quot;, {}, descText);
        desc.id = svg.id + &quot;-desc&quot;;
        svg.appendChild(title);
        svg.appendChild(desc);
      }

      function drawOutcomes(results, initial) {
        const svg = els.chart;
        clear(svg, &quot;Rolling historical retirement outcomes&quot;, &quot;Each mark is a possible historical retirement start year and its final inflation-adjusted portfolio balance.&quot;);

        const plotW = width - margin.left - margin.right;
        const plotH = height - margin.top - margin.bottom;
        const maxY = Math.max(initial * 1.25, ...results.map(r =&gt; r.finalBalance));
        const x = i =&gt; margin.left + (results.length === 1 ? plotW / 2 : i * plotW / (results.length - 1));
        const y = v =&gt; margin.top + plotH - Math.max(0, v) / maxY * plotH;

        [0, .5, 1].forEach(t =&gt; {
          const yy = margin.top + plotH - t * plotH;

        svg.appendChild(svgEl(&quot;line&quot;, { x1: margin.left, y1: y(initial), x2: width - margin.right, y2: y(initial), class: &quot;wrc-initial&quot; }));

      function showTooltip(mark, result) {
        const svgBox = els.chart.getBoundingClientRect();
        const markBox = mark.getBoundingClientRect();
        els.tooltip.innerHTML = `&lt;strong&gt;${result.startDate}&lt;/strong&gt;&lt;br&gt;${result.failed ? &quot;Depleted in year &quot; + result.failYear : &quot;Ended at &quot; + money.format(result.finalBalance)}&lt;br&gt;Max drawdown ${pct.format(result.maxDrawdown)}`;

        const tipBox = els.tooltip.getBoundingClientRect();

        const top = Math.max(0, markBox.top - svgBox.top - tipBox.height - 8);
        els.tooltip.style.left = `${left}px`;
        els.tooltip.style.top = `${top}px`;

        const plotW = width - margin.left - margin.right;

        const maxY = Math.max(initial, ...result.path.map(p =&gt; p.balance));
        const x = y =&gt; margin.left + (y - 1) * plotW / Math.max(1, result.path.length - 1);

          svg.appendChild(svgEl(&quot;text&quot;, { x: margin.left - 8, y: yy + 4, &quot;text-anchor&quot;: &quot;end&quot;, class: &quot;wrc-label text-small&quot; }, money.format(maxY * t)));
        });
        const d = result.path.map((p, i) =&gt; `${i ? &quot;L&quot; : &quot;M&quot;}${x(p.year).toFixed(1)},${y(p.balance).toFixed(1)}`).join(&quot; &quot;);
        svg.appendChild(svgEl(&quot;path&quot;, { d, class: &quot;wrc-line&quot; }));
        svg.appendChild(svgEl(&quot;text&quot;, { x: margin.left, y: height - 10, class: &quot;wrc-label text-small&quot; }, &quot;Year 1&quot;));
        svg.appendChild(svgEl(&quot;text&quot;, { x: width - margin.right, y: height - 10, &quot;text-anchor&quot;: &quot;end&quot;, class: &quot;wrc-label text-small&quot; }, `Year ${result.path.length}`));
        svg.appendChild(svgEl(&quot;text&quot;, { x: margin.left, y: 12, class: &quot;wrc-label text-small&quot; }, `Worst path from ${result.startDate}`));
      }

      function update() {
        const initial = Math.max(10000, Number(els.portfolio.value) || 1000000);
        const annualRate = Number(els.rate.value) / 100;
        const years = Number(els.years.value);
        const fee = Number(els.fee.value) / 100;
        const stockWeight = Number(els.stock.value) / 100;
        const maxStart = annualReturns.length - years;
        if (maxStart &lt; 0) {
          els.years.value = annualReturns.length;
          update();
          return;
        }
        const results = [];
        for (let i = 0; i &lt;= maxStart; i += 1) results.push(simulate(i, years, initial, annualRate, fee, stockWeight));
        const successes = results.filter(r =&gt; !r.failed).length;
        const worst = results.reduce((a, b) =&gt; a.finalBalance &lt;= b.finalBalance ? a : b);
        const worstDrawdown = results.reduce((a, b) =&gt; a.maxDrawdown &lt;= b.maxDrawdown ? a : b);

        els.rateLabel.textContent = `${Number(els.rate.value).toFixed(1)}%`;
        els.yearsLabel.textContent = `${years} years`;
        els.stockLabel.textContent = `${Number(els.stock.value)}%`;
        els.feeLabel.textContent = `${Number(els.fee.value).toFixed(2)}%`;
        els.success.textContent = pct.format(successes / results.length);
        els.complete.textContent = `${successes} of ${results.length} rolling starts survived`;
        els.worstStart.textContent = worst.startDate;
        els.worstEnd.textContent = worst.failed ? `depleted in year ${worst.failYear}` : `ended at ${money.format(worst.finalBalance)}`;
        els.drawdown.textContent = pct.format(worstDrawdown.maxDrawdown);
        els.spend.textContent = `${money.format(initial * annualRate)}/year, ${Number(els.stock.value)}/${100 - Number(els.stock.value)} mix`;

        drawOutcomes(results, initial);
        drawPath(worst, initial);
      }

      [&quot;input&quot;, &quot;change&quot;].forEach(eventName =&gt; {
        [els.portfolio, els.rate, els.years, els.stock, els.fee].forEach(el =&gt; el.addEventListener(eventName, update));
      });
      window.addEventListener(&quot;resize&quot;, update);
      update();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
